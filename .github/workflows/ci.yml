name: CI

on:
  push:
    branches: [ dev, main ]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - name: fmt
        run: cargo fmt --all -- --check
      - name: clippy
        run: cargo clippy --all-targets --all-features -- -D warnings -A clippy::too_many_arguments -A clippy::type_complexity -A clippy::explicit_auto_deref -A clippy::manual_clamp -A clippy::collapsible_else_if -A clippy::derivable_impls
      - name: test
        run: cargo test --all --no-fail-fast
      # rodio backend build is platform-specific; validate in local macOS dev. CI focuses on engine/core/ui.
      - name: build snapshots
        run: cargo build --bin snapshots
      - name: run snapshots
        run: cargo run --bin snapshots
