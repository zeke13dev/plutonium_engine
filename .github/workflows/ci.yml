name: CI

on:
  push:
    branches: [ dev, main ]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  MSRV: "1.79.0"
  CLIPPY_FLAGS: >-
    -D warnings
    -A clippy::too_many_arguments
    -A clippy::type_complexity
    -A clippy::explicit_auto_deref
    -A clippy::manual_clamp
    -A clippy::collapsible_else_if
    -A clippy::derivable_impls

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - name: fmt
        run: cargo fmt --all -- --check
      - name: clippy
        run: cargo clippy --all-targets --all-features -- $CLIPPY_FLAGS
      - name: test
        run: cargo test --all --no-fail-fast
      # rodio backend build is platform-specific; validate in local macOS dev. CI focuses on engine/core/ui.
      - name: build snapshots
        run: cargo build --bin snapshots
      - name: run snapshots
        run: cargo run --bin snapshots

  feature-matrix:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        features:
          - "--no-default-features"
          - "--features widgets"
          - "--features layout"
          - "--features anim"
          - "--features raster"
          - "--all-features"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - name: check feature set
        run: cargo check -p plutonium_engine ${{ matrix.features }}

  wasm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - name: check wasm minimal
        run: cargo check -p plutonium_engine --target wasm32-unknown-unknown --no-default-features --features wasm
      - name: check wasm all features
        run: cargo check -p plutonium_engine --target wasm32-unknown-unknown --all-features

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - name: build docs
        run: RUSTDOCFLAGS="-D warnings" cargo doc --no-deps --all-features

  msrv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.MSRV }}
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - name: check declared MSRV
        run: cargo check -p plutonium_engine --locked

  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - name: package dry run
        run: cargo package --locked

  api-surface:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: dtolnay/rust-toolchain@nightly
        with:
          targets: wasm32-unknown-unknown
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - name: Install cargo-public-api
        run: cargo install cargo-public-api --locked
      - name: auto-trait guard test
        run: cargo test --test api_autotraits
      - name: check public API (host + wasm32)
        run: bash scripts/check-api.sh
